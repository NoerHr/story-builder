<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #7c3aed;
            --bg-gray: #f3f4f6;
            --white: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --danger: #ef4444; /* Warna merah untuk STOP */
            --danger-hover: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 360px;
            background-color: var(--bg-gray);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 12px;
            color: var(--text-main);
        }

        .container {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--white); overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1.25rem 1.25rem; color: var(--white);
            position: relative; overflow: hidden;
        }

        .header-content {
            position: relative; z-index: 10; display: flex; align-items: center; gap: 0.75rem;
        }

        .icon-box {
            background: rgba(255, 255, 255, 0.2); padding: 0.5rem;
            border-radius: 0.75rem; backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
        }

        .header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }
        .header p { font-size: 10px; font-weight: 600; text-transform: uppercase; opacity: 0.8; }

        .header-deco {
            position: absolute; right: -1rem; top: -1rem;
            width: 6rem; height: 6rem; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; pointer-events: none;
        }

        .main-content { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

        .status-card {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--white); padding: 1rem; border-radius: 1rem;
            border: 1px solid #f9fafb; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .status-info { display: flex; flex-direction: column; }
        .label { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; }
        .status-value { font-size: 0.875rem; font-weight: 700; color: var(--primary); }

        .indicator { position: relative; display: flex; height: 0.75rem; width: 0.75rem; }
        .pulse {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background-color: #4ade80; opacity: 0.75; animation: pulse-ring 2s infinite;
            display: none; /* Disembunyikan saat standby */
        }
        .dot {
            position: relative; width: 0.75rem; height: 0.75rem; border-radius: 50%;
            background-color: #9ca3af; /* Abu-abu saat mati */
        }
        
        /* State saat aktif */
        .is-active .pulse { display: block; }
        .is-active .dot { background-color: var(--success); }

        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.75; } 50% { transform: scale(1.5); opacity: 0; } }

        .settings-card {
            background: #f8fafc; padding: 1rem; border-radius: 1rem;
            border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 0.75rem;
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; }
        .setting-row label { font-size: 11px; font-weight: 700; color: var(--text-main); }
        .setting-row input {
            width: 80px; padding: 0.35rem 0.5rem; border: 1px solid #cbd5e1;
            border-radius: 0.5rem; font-size: 12px; font-family: inherit;
            color: var(--primary); font-weight: 700; outline: none; text-align: right;
        }
        .setting-row input[type="text"] { width: 100%; text-align: left; }

        .save-btn {
            background-color: #eef2ff; color: var(--primary); border: 1px solid #c7d2fe;
            padding: 0.5rem; border-radius: 0.5rem; font-size: 10px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; width: 100%;
        }
        .save-btn.success { background-color: #d1fae5; color: #059669; border-color: #a7f3d0; }

        .start-btn {
            width: 100%; padding: 1rem; background-color: var(--primary); color: var(--white);
            border: none; border-radius: 1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); transition: all 0.2s;
        }
        .start-btn:hover { background-color: var(--primary-hover); }

        /* Tombol saat berubah jadi merah (OFF) */
        .stop-btn {
            background-color: var(--danger) !important;
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3) !important;
        }
        .stop-btn:hover { background-color: var(--danger-hover) !important; }

        .loading-box { display: none; text-align: center; padding: 0.5rem 0; }
        .dots { display: flex; justify-content: center; gap: 0.25rem; margin-bottom: 0.5rem; }
        .dot-bounce {
            width: 6px; height: 6px; background-color: var(--primary);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot-bounce:nth-child(1) { animation-delay: -0.32s; }
        .dot-bounce:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .loading-text { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }

        .footer {
            background: rgba(249, 250, 251, 0.8); padding: 1rem 1.25rem;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #f3f4f6;
        }
        .stat-item { text-align: center; flex: 1; border-right: 1px solid #e5e7eb; }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 10px; color: #9ca3af; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 12px; font-weight: 700; color: #374151; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </div>
                <div>
                    <h1>InkFlow AI</h1>
                    <p>Automation Engine</p>
                </div>
            </div>
            <div class="header-deco"></div>
        </div>

        <!-- Konten Utama -->
        <div class="main-content">
            <!-- Status Card -->
            <div class="status-card">
                <div class="status-info">
                    <span class="label">System Status</span>
                    <span id="status-text" class="status-value" style="color:#9ca3af;">Standby Mode</span>
                </div>
                <div class="indicator" id="status-indicator">
                    <span class="pulse"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="settings-card">
                <div class="setting-row">
                    <label>Limit Kata (per Tab)</label>
                    <input type="number" id="input-word-limit" value="15000">
                </div>
                <div class="setting-row">
                    <label>Batas Tab / File</label>
                    <input type="number" id="input-tab-limit" value="9">
                </div>
                
                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 4px;">
                    <label>Link Custom GPT</label>
                    <input type="text" id="input-gpt-url" placeholder="https://chatgpt.com/g/..." style="width: 100%;">
                </div>
                
                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 4px;">
                    <label>ID Google Doc (Opsional)</label>
                    <input type="text" id="input-doc-id" placeholder="Kosongkan untuk buat baru" style="width: 100%;">
                </div>

                <button id="save-settings-btn" class="save-btn">Simpan Pengaturan</button>
            </div>

            <!-- Action Button (Bisa Nyala / Mati) -->
            <button id="start-btn" class="start-btn">
                <span id="btn-text">AKTIFKAN ENGINE</span>
                <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </button>

            <!-- Running Message -->
            <div id="msg-box" class="loading-box">
                <div class="dots">
                    <div class="dot-bounce"></div>
                    <div class="dot-bounce"></div>
                    <div class="dot-bounce"></div>
                </div>
                <p class="loading-text">Sinkronisasi Berjalan</p>
            </div>
        </div>

        <!-- Footer Stats -->
        <div class="footer">
            <div class="stat-item">
                <p class="stat-label">Limit</p>
                <p class="stat-value" id="stat-word-limit">15K Kata</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Cycle</p>
                <p class="stat-value" id="stat-tab-limit">9 Tabs</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Versi</p>
                <p class="stat-value">v2.0 (Auto)</p>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
